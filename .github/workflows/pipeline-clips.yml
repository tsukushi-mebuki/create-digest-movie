name: pipeline-clips

on:
  workflow_dispatch:
    inputs:
      job_id:
        description: Target job id
        required: true
        type: string

jobs:
  clips:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    env:
      JOB_ID: ${{ github.event.inputs.job_id }}
      WEBHOOK_URL: ${{ vars.WEBHOOK_URL }}
      WEBHOOK_SECRET: ${{ secrets.WEBHOOK_SECRET }}
      GCS_UPLOAD_BUCKET: ${{ vars.GCS_UPLOAD_BUCKET }}
      GCS_UPLOAD_PREFIX: ${{ vars.GCS_UPLOAD_PREFIX }}
      DRIVE_FOLDER_02_TEXT_ASSETS: ${{ vars.DRIVE_FOLDER_02_TEXT_ASSETS }}
      DRIVE_FOLDER_03_COMPLETED_SHORTS: ${{ vars.DRIVE_FOLDER_03_COMPLETED_SHORTS }}
      SHORT_COUNT: ${{ vars.SHORT_COUNT }}
      SHORT_MAX_DURATION_SEC: ${{ vars.SHORT_MAX_DURATION_SEC }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r pipelines/requirements.txt

      - name: Materialize service account key file from GitHub Secret
        env:
          GCP_SERVICE_ACCOUNT_KEY: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}
        run: |
          if [ -z "$GCP_SERVICE_ACCOUNT_KEY" ]; then
            echo "GCP_SERVICE_ACCOUNT_KEY is required"
            exit 1
          fi
          KEY_FILE="$RUNNER_TEMP/gcp-service-account.json"
          printf '%s' "$GCP_SERVICE_ACCOUNT_KEY" > "$KEY_FILE"
          echo "GCP_SERVICE_ACCOUNT_KEY_FILE=$KEY_FILE" >> "$GITHUB_ENV"

      - name: Run clip pipeline
        run: |
          python pipelines/src/clip_pipeline.py
