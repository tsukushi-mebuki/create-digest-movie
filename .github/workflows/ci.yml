name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  api-quality-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
      GCP_SERVICE_ACCOUNT_KEY: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}
      GOOGLE_DRIVE_RESUMABLE_ENDPOINT: ${{ secrets.GOOGLE_DRIVE_RESUMABLE_ENDPOINT }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Build and start containers
        run: docker compose up -d --build db api

      - name: Wait for DB health
        run: |
          db_container_id=$(docker compose ps -q db)
          if [ -z "$db_container_id" ]; then
            echo "DB container not found"
            docker compose ps
            docker compose logs db
            exit 1
          fi

          for i in {1..30}; do
            status=$(docker inspect --format='{{.State.Health.Status}}' "$db_container_id" || true)
            if [ "$status" = "healthy" ]; then
              echo "DB is healthy"
              exit 0
            fi
            echo "Current DB health status: ${status:-unknown}"
            sleep 2
          done
          echo "DB did not become healthy in time"
          docker compose ps
          docker compose logs db
          exit 1

      - name: Run Issue #1 quality tests
        run: |
          for i in {1..10}; do
            if docker compose exec -T api php /var/www/tests/run_issue1_quality_tests.php; then
              exit 0
            fi
            echo "Quality tests failed on attempt ${i}. Retrying in 3 seconds..."
            sleep 3
          done
          echo "Quality tests failed after retries"
          docker compose ps
          docker compose logs db
          docker compose logs api
          exit 1

      - name: Run Issue #2 quality tests
        run: |
          for i in {1..10}; do
            if docker compose exec -T api php /var/www/tests/run_issue2_quality_tests.php; then
              exit 0
            fi
            echo "Issue #2 quality tests failed on attempt ${i}. Retrying in 3 seconds..."
            sleep 3
          done
          echo "Issue #2 quality tests failed after retries"
          docker compose ps
          docker compose logs db
          docker compose logs api
          exit 1

      - name: Run Issue #3 quality tests
        run: |
          for i in {1..10}; do
            if docker compose exec -T api php /var/www/tests/run_issue3_quality_tests.php; then
              exit 0
            fi
            echo "Issue #3 quality tests failed on attempt ${i}. Retrying in 3 seconds..."
            sleep 3
          done
          echo "Issue #3 quality tests failed after retries"
          docker compose ps
          docker compose logs db
          docker compose logs api
          exit 1

      - name: Run Issue #4 quality tests
        run: |
          for i in {1..10}; do
            if docker compose exec -T api php /var/www/tests/run_issue4_quality_tests.php; then
              exit 0
            fi
            echo "Issue #4 quality tests failed on attempt ${i}. Retrying in 3 seconds..."
            sleep 3
          done
          echo "Issue #4 quality tests failed after retries"
          docker compose ps
          docker compose logs db
          docker compose logs api
          exit 1

      - name: Setup Python for Issue #5 quality tests
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install Python dependencies for Issue #5 quality tests
        run: |
          python -m pip install --upgrade pip
          pip install requests python-dotenv tenacity

      - name: Run Issue #5 quality tests
        run: |
          for i in {1..5}; do
            if python pipelines/tests/run_issue5_quality_tests.py; then
              exit 0
            fi
            echo "Issue #5 quality tests failed on attempt ${i}. Retrying in 3 seconds..."
            sleep 3
          done
          echo "Issue #5 quality tests failed after retries"
          docker compose ps
          docker compose logs db
          docker compose logs api
          exit 1

      - name: Run Issue #6 quality tests
        run: |
          for i in {1..5}; do
            if python pipelines/tests/run_issue6_quality_tests.py; then
              exit 0
            fi
            echo "Issue #6 quality tests failed on attempt ${i}. Retrying in 3 seconds..."
            sleep 3
          done
          echo "Issue #6 quality tests failed after retries"
          docker compose ps
          docker compose logs db
          docker compose logs api
          exit 1

      - name: Run Drive connectivity smoke test
        run: |
          for i in {1..5}; do
            if docker compose exec -T api php /var/www/tests/run_drive_connectivity_smoke_test.php; then
              exit 0
            fi
            echo "Drive connectivity smoke test failed on attempt ${i}. Retrying in 3 seconds..."
            sleep 3
          done
          echo "Drive connectivity smoke test failed after retries"
          docker compose ps
          docker compose logs db
          docker compose logs api
          exit 1

      - name: Tear down
        if: always()
        run: docker compose down -v