name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  api-quality-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build and start containers
        run: docker compose up -d --build db api

      - name: Wait for DB health
        run: |
          for i in {1..30}; do
            status=$(docker inspect --format='{{json .State.Health.Status}}' cdm-db || true)
            if [ "$status" = "\"healthy\"" ]; then
              echo "DB is healthy"
              exit 0
            fi
            sleep 2
          done
          echo "DB did not become healthy in time"
          docker compose logs db
          exit 1

      - name: Run Issue #1 quality tests
        run: docker compose exec -T api php /var/www/tests/run_issue1_quality_tests.php

      - name: Tear down
        if: always()
        run: docker compose down -v